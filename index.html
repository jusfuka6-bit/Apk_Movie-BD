<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie BD - App Store</title>
    <style>
        /* টেক্সট সিলেকশন বন্ধ */
        * {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            color: #202124;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .app-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .app-logo {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            margin-right: 20px;
            object-fit: cover;
        }

        .app-info h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 500;
        }

        .stats-container {
            display: flex;
            justify-content: space-between;
            margin: 25px 0;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 15px;
        }

        .stat-item { flex: 1; }
        .stat-value { font-weight: bold; font-size: 16px; display: block; }
        .stat-label { font-size: 12px; color: #5f6368; }

        .install-btn {
            background-color: #01579b;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 30px;
            display: block;
            text-align: center;
        }

        /* স্ক্রিনশট লিস্ট */
        .screenshots {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        .screenshots img {
            width: 160px;
            border-radius: 10px;
            border: 1px solid #f1f3f4;
            cursor: pointer;
        }

        /* স্লাইডার মোডাল */
        #imageModal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .slider-wrapper::-webkit-scrollbar { display: none; }

        .slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
        }

        .slide img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        /* টোস্ট মেসেজ */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 17px;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 4.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .about-section h2 { font-size: 20px; margin-bottom: 10px; }
        .about-section p { color: #5f6368; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <img src="https://raw.githubusercontent.com/jusfuka6-bit/img/refs/heads/main/Movie_BD.jpg" alt="App Logo" class="app-logo">
        <div class="app-info">
            <h1>Movie BD</h1>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-item">
            <span class="stat-value">Version: 2.2</span> 
        </div>
        <div class="stat-item" style="border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0;">
            <span class="stat-label">Update</span> <span class="stat-value">17/April</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">12+</span>
            <span class="stat-label">Rated for 12+</span>
        </div>
    </div>

    <a href="https://raw.githubusercontent.com/jusfuka6-bit/Apk/main/Movie%20BD.apk" style="text-decoration: none;" id="download-trigger">
        <button class="install-btn">Update</button>
    </a>

    <div id="toast">অ্যাপ ডাউনলোড হচ্ছে...</div>

    <div class="screenshots" id="gallery">
        <img src="https://raw.githubusercontent.com/jusfuka6-bit/img/refs/heads/main/Screenshot_1.jpg">
        <img src="https://raw.githubusercontent.com/jusfuka6-bit/img/refs/heads/main/Screenshot_2.jpg">
        <img src="https://raw.githubusercontent.com/jusfuka6-bit/img/refs/heads/main/Screenshot_3.jpg">
        <img src="https://raw.githubusercontent.com/jusfuka6-bit/img/refs/heads/main/Screenshot_4.jpg">
    </div>

    <div id="imageModal">
        <div class="slider-wrapper" id="sliderWrapper">
            </div>
    </div>

    <div class="about-section">
        <h2>About this app</h2>
        <p>Movie BD - আপনার প্রিয় সিনেমা ও নাটকের সব খবর এবং আপডেট এখন এক অ্যাপেই।</p>
    </div>
</div>

<script>
    // ডাউনলোড টোস্ট
    const downloadBtn = document.getElementById('download-trigger');
    const toast = document.getElementById('toast');

    downloadBtn.addEventListener('click', function() {
        toast.className = "show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 5000);
    });

    // স্লাইডার গ্যালারি এবং ব্যাক বাটন লজিক
    const galleryImages = document.querySelectorAll('#gallery img');
    const modal = document.getElementById('imageModal');
    const sliderWrapper = document.getElementById('sliderWrapper');

    let isModalOpen = false;

    function openModal(index) {
        modal.style.display = 'block';
        isModalOpen = true;
        const slideWidth = sliderWrapper.offsetWidth;
        sliderWrapper.scrollLeft = index * slideWidth;
        
        // ব্রাউজার হিস্ট্রিতে নতুন স্টেট পুশ করা
        window.history.pushState({modal: 'open'}, "");
    }

    function closeModal() {
        modal.style.display = 'none';
        isModalOpen = false;
    }

    galleryImages.forEach((img, index) => {
        const slide = document.createElement('div');
        slide.className = 'slide';
        // স্লাইডের খালি জায়গায় ক্লিক করলে মোডাল বন্ধ হবে
        slide.onclick = (e) => {
            if (e.target === slide) {
                window.history.back(); // এটি popstate ইভেন্ট ট্রিগার করবে এবং closeModal কল হবে
            }
        };
        
        const fullImg = document.createElement('img');
        fullImg.src = img.src;
        fullImg.onclick = (e) => { e.stopPropagation(); }; // ছবিতে ক্লিক করলে কিছু হবে না (শুধু স্লাইড)
        
        slide.appendChild(fullImg);
        sliderWrapper.appendChild(slide);

        img.addEventListener('click', () => {
            openModal(index);
        });
    });

    // ব্রাউজারের ব্যাক বাটন বা window.history.back() এর জন্য
    window.onpopstate = function(event) {
        closeModal();
    };

    // মোডালের বাইরের অংশে ক্লিক হ্যান্ডলার (নিরাপত্তার জন্য)
    modal.onclick = (e) => {
        if (e.target === modal || e.target === sliderWrapper) {
            window.history.back();
        }
    };
</script>

</body>
</html>
