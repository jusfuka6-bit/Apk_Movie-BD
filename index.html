<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie BD - App Store</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            color: #202124;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Header Section */
        .app-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .app-logo {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            margin-right: 20px;
            object-fit: cover;
        }

        .app-info h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 500;
        }

        /* Stats Row */
        .stats-container {
            display: flex;
            justify-content: space-between;
            margin: 25px 0;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 15px;
        }

        .stat-item {
            flex: 1;
        }

        .stat-value {
            font-weight: bold;
            font-size: 16px;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: #5f6368;
        }

        /* Update Button */
        .install-link {
            text-decoration: none;
        }

        .install-btn {
            background-color: #01579b;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 30px;
            display: block;
            text-align: center;
        }

        /* Screenshot Section */
        .screenshots {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        .screenshots img {
            width: 160px;
            border-radius: 10px;
            border: 1px solid #f1f3f4;
        }

        /* Toast Message Design */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 17px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }

        .about-section h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .about-section p {
            color: #5f6368;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <img src="https://raw.githubusercontent.com/jusfuka6-bit/img/refs/heads/main/Movie_BD.jpg" alt="App Logo" class="app-logo">
        <div class="app-info">
            <h1>Movie BD</h1>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-item">
            <span class="stat-value">Version: 2.2</span> 
        </div>
        <div class="stat-item" style="border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0;">
            <span class="stat-value">22</span> <span class="stat-label">Downloads</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">12+</span>
            <span class="stat-label">Rated for 12+</span>
        </div>
    </div>

    <a href="https://raw.githubusercontent.com/jusfuka6-bit/Apk/main/Movie%20BD.apk" class="install-link" id="download-trigger">
        <button class="install-btn">Update</button>
    </a>

    <div id="toast">অ্যাপ ডাউনলোড হচ্ছে...</div>

    <div class="screenshots">
        <img src="https://via.placeholder.com/160x300?text=Screen+1" alt="Screenshot 1">
        <img src="https://via.placeholder.com/160x300?text=Screen+2" alt="Screenshot 2">
        <img src="https://via.placeholder.com/160x300?text=Screen+3" alt="Screenshot 3">
        <img src="https://via.placeholder.com/160x300?text=Screen+4" alt="Screenshot 4">
    </div>

    <div class="about-section">
        <h2>About this app</h2>
        <p>Movie BD - আপনার প্রিয় সিনেমা ও নাটকের সব খবর এবং আপডেট এখন এক অ্যাপেই।</p>
    </div>
</div>

<script>
    const downloadBtn = document.getElementById('download-trigger');
    const toast = document.getElementById('toast');

    downloadBtn.addEventListener('click', function() {
        // টোস্ট মেসেজ দেখানো
        toast.className = "show";
        
        // ৩ সেকেন্ড পর টোস্টটি সরিয়ে ফেলা
        setTimeout(function(){ 
            toast.className = toast.className.replace("show", ""); 
        }, 5000);
    });
</script>

</body>
</html>
